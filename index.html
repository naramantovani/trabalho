<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Academia PowerFit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="logo.png" class="logo">

        <nav>
            <a href="#">Início</a>
            <a href="#">Planos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Transforme seu corpo e sua saúde</h2>
        <p>Treine com os melhores equipamentos</p>
        <button>Começar Agora</button>
    </section>

    <section class="planos">

        <div class="plano">
            <h3>Plano Básico</h3>
            <p>Acesso à musculação</p>
            <h2>R$50 <small>/mês</small></h2>
            <button>Assinar</button>
        </div>

        <div class="plano destaque">
            <h3>Plano Premium</h3>
            <p>Musculação + Aulas</p>
            <h2>R$80 <small>/mês</small></h2>
            <button>Assinar</button>
        </div>

        <div class="plano">
            <h3>Plano VIP</h3>
            <p>Tudo incluso + Personal</p>
            <h2>R$120 <small>/mês</small></h2>
            <button>Assinar</button>
        </div>

    </section>

    <footer>
        <p>© 2026 Academia PowerFit</p>
    </footer>

</body>

</html>
